<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Fretzia Bakery®</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="assets/favicon_io/favicon.ico">
  <style>
    /* Windows 2000 Global Styles */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #008080;
      font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
      cursor: default;
    }
    /* Win2K scrollbar */
    ::-webkit-scrollbar { width: 16px; height: 16px; }
    ::-webkit-scrollbar-track { background: #d4d0c8; border: 1px solid #808080; }
    ::-webkit-scrollbar-thumb {
      background: #d4d0c8;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
    }
    ::-webkit-scrollbar-button {
      background: #d4d0c8;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      width: 16px; height: 16px;
    }
    @keyframes win-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    /* Win2K taskbar at the bottom */
    body::after {
      content: '▶  Start   |   📁 Fretzia Bakery   |   🍰 Cheescakes   |   🥧 Pies   |   🍪 Cookies   |   📞 Contacto          🔊 🕐 12:00 PM';
      display: block;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #d4d0c8;
      border-top: 2px solid #ffffff;
      color: #000;
      font-family: 'Tahoma', 'Arial', sans-serif;
      font-size: 11px;
      font-weight: bold;
      padding: 0 8px;
      line-height: 28px;
      z-index: 9999;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.7);
      white-space: nowrap;
      overflow: hidden;
    }
  </style>
</head>
<body style="padding-bottom: 28px;">
  <app-root></app-root>
</body>
</html>
